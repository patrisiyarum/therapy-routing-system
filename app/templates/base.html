<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Therapy Routing System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef3f3; --card:#fff; --ink:#143230; --muted:#5d6f6d;
    --teal:#0d9488; --teal-d:#0f5f57; --teal-dd:#0f3d3e; --mint:#5eead4;
    --amber:#b45309; --amber-bg:#fef3c7; --border:#dde7e6; --rose:#9f5b48; --rose-bg:#f6e7e1;
    --gold:#b08400; --gold-bg:#fdf3d3; --shadow:0 12px 34px -16px rgba(15,61,62,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:"Public Sans",system-ui,sans-serif;line-height:1.5;
    background-image:radial-gradient(circle at 88% -6%, rgba(94,234,212,.20), transparent 40%),
                     radial-gradient(circle at -6% 108%, rgba(13,148,136,.12), transparent 45%);min-height:100vh}
  .wrap{max-width:1140px;margin:0 auto;padding:34px 26px 70px}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:600;letter-spacing:-.01em;margin:0}
  a{color:var(--teal-d);text-decoration:none}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--teal-d)}
  .lede{color:var(--muted);font-size:16px;max-width:680px;margin-top:10px}
  .top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:6px}
  .badges{display:flex;gap:8px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%}.on{background:var(--teal)}.off{background:#c2cdcc}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:24px}
  label.field{display:block;margin-bottom:16px}
  label.field .lbl{font-weight:600;font-size:14px;display:block;margin-bottom:7px}
  input[type=file]{width:100%;padding:13px;border:1.5px dashed var(--border);border-radius:12px;background:#f7faf9;font-family:inherit;font-size:13.5px;color:var(--muted);cursor:pointer}
  input[type=file]::file-selector-button{font-family:inherit;font-weight:600;border:0;background:var(--teal-dd);color:#fff;padding:9px 14px;border-radius:8px;margin-right:12px;cursor:pointer}
  .toggles{display:flex;gap:14px;flex-wrap:wrap;margin:6px 0 18px}
  .toggle{display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:12px;padding:11px 14px;background:#f7faf9;font-size:13.5px;flex:1;min-width:230px}
  .toggle input{width:18px;height:18px;accent-color:var(--teal)} .toggle small{display:block;color:var(--muted);font-size:12px} .toggle.disabled{opacity:.55}
  button.go,.btn{font-family:inherit;font-weight:700;font-size:15px;border:0;cursor:pointer;background:var(--teal-dd);color:#fff;padding:13px 24px;border-radius:12px;box-shadow:0 10px 22px -10px rgba(15,61,62,.6);transition:transform .12s}
  button.go:hover,.btn:hover{transform:translateY(-1px)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:20px 0}
  .stat{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px 18px}
  .stat .v{font-family:"Fraunces",serif;font-size:32px;font-weight:700;color:var(--teal-dd)}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .stat.alt{background:var(--teal-dd)} .stat.alt .v{color:var(--mint)} .stat.alt .k{color:#bfe9e3}
  .stat.warn .v{color:var(--amber)} .stat a{color:inherit}
  .sectitle{font-size:20px;margin:26px 0 12px}
  .tablewrap{overflow:auto;border:1px solid var(--border);border-radius:16px;background:#fff;box-shadow:var(--shadow)}
  table{border-collapse:collapse;width:100%;font-size:13.5px}
  th{position:sticky;top:0;background:var(--teal-dd);color:#dff3f0;text-align:left;padding:11px 13px;font-weight:600;white-space:nowrap;font-size:12px}
  td{padding:11px 13px;border-top:1px solid var(--border);vertical-align:middle}
  tr:nth-child(even) td{background:#f8fbfa}
  .pill{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill.prio{background:var(--amber-bg);color:var(--amber)} .pill.inp{background:#e3f0ef;color:var(--teal-d)}
  .pill.tele{background:#e7e9fb;color:#4b4fa6} .pill.gold{background:var(--gold-bg);color:var(--gold)}
  .pill.miss{background:var(--rose-bg);color:var(--rose);margin:0 4px 4px 0}
  .bar{height:9px;border-radius:999px;background:#e6efee;overflow:hidden;min-width:120px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-d))}
  .openlink{font-weight:700}
  .score{font-family:"Fraunces",serif;font-weight:700;color:var(--teal-dd);font-size:16px}
  .scard{background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:14px}
  .scard.golden{border-color:#e9cf7a;background:linear-gradient(180deg,#fffdf5,#fff)}
  .srow{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap}
  .why{color:var(--muted);font-size:13.5px;margin:8px 0 12px;max-width:760px}
  .actions{display:flex;gap:10px;align-items:center}
  .btn.add{padding:10px 18px;font-size:14px}
  .btn.decline{background:#fff;color:var(--rose);border:1.5px solid var(--rose-bg);box-shadow:none;padding:10px 16px;font-size:14px}
  .reasonbox{display:flex;gap:8px;align-items:center;margin-top:2px}
  .reasonbox input{font-family:inherit;font-size:13px;padding:9px 11px;border:1px solid var(--border);border-radius:9px;min-width:220px}
  .meta{color:var(--muted);font-size:12.5px}
  .navlink{font-weight:600;margin-right:18px}
  .note{font-size:12.5px;color:var(--muted);margin-top:12px}
</style>
</head>
<body><div class="wrap">{% block body %}{% endblock %}</div></body>
</html>
